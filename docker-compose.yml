version: "3.9"

services:
  meetly-postgres:
    image: postgres:16-alpine
    container_name: meetly-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: meetly
      POSTGRES_USER: meetly
      POSTGRES_PASSWORD: meetly
      TZ: Asia/Manila
    volumes:
      - meetly_pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetly -d meetly"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  meetly_pg_data: